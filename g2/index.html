<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>坦克大战</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background-color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Arial', sans-serif;
        }
        
        #game-container {
            position: relative;
        }
        
        #game-canvas {
            display: block;
            background-color: #000;
            border: 2px solid #666;
        }
        
        #game-ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
            font-size: 14px;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.8);
        }
        
        #game-ui div {
            margin-bottom: 5px;
        }
        
        #game-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fff;
            font-size: 24px;
        }
        
        #game-overlay button {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 18px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        
        #game-overlay button:hover {
            background-color: #45a049;
        }
        
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="game-canvas" width="520" height="520"></canvas>
        <div id="game-ui">
            <div>分数: <span id="score">0</span></div>
            <div>生命: <span id="lives">3</span></div>
            <div>关卡: <span id="level">1</span></div>
        </div>
        <div id="game-overlay" class="hidden">
            <div id="overlay-message">准备开始</div>
            <button id="overlay-button">开始游戏</button>
        </div>
    </div>
    
    <script type="module">
        import Game from './js/Game.js';
        
        // 初始化游戏
        const canvas = document.getElementById('game-canvas');
        const scoreEl = document.getElementById('score');
        const livesEl = document.getElementById('lives');
        const levelEl = document.getElementById('level');
        const overlay = document.getElementById('game-overlay');
        const overlayMessage = document.getElementById('overlay-message');
        const overlayButton = document.getElementById('overlay-button');
        
        // 创建游戏实例
        const game = new Game(canvas, {
            onScoreUpdate: (score) => {
                scoreEl.textContent = score;
            },
            onLivesUpdate: (lives) => {
                livesEl.textContent = lives;
            },
            onLevelUpdate: (level) => {
                levelEl.textContent = level;
            },
            onGameOver: () => {
                overlayMessage.textContent = '游戏结束！';
                overlayButton.textContent = '重新开始';
                overlay.classList.remove('hidden');
            },
            onLevelComplete: () => {
                overlayMessage.textContent = '关卡通过！';
                overlayButton.textContent = '下一关';
                overlay.classList.remove('hidden');
            }
        });
        
        // 按钮点击事件
        overlayButton.addEventListener('click', () => {
            overlay.classList.add('hidden');
            
            if (overlayButton.textContent === '重新开始') {
                game.reset();
                game.start();
            } else if (overlayButton.textContent === '下一关') {
                game.nextLevel();
                game.start();
            } else {
                game.start();
            }
        });
        
        // 显示开始界面
        overlayMessage.textContent = '坦克大战';
        overlayButton.textContent = '开始游戏';
        overlay.classList.remove('hidden');
    </script>
</body>
</html>
